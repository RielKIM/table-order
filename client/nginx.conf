# 테이블오더 Client - nginx SPA 정적 서빙 설정
# 단일 SPA 빌드: '/' (Customer) 및 '/admin' (Admin) 모두 index.html 로 폴백.
# API/SSE 는 클라이언트가 VITE_API_URL 절대 경로로 직접 호출하므로 프록시 불필요.

server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # gzip 압축
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/json application/javascript
                    application/x-javascript text/xml application/xml
                    application/xml+rss text/javascript image/svg+xml;

    # 해시 파일명을 가진 정적 에셋은 장기 캐싱 (immutable)
    location /assets/ {
        expires    1y;
        add_header  Cache-Control "public, immutable";
        try_files   $uri =404;
    }

    # SPA history fallback: 알 수 없는 경로는 index.html 로
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html 은 캐시하지 않음 (새 배포 즉시 반영)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
